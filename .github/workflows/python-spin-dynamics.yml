name: PythonSpinDynamics

on:
  push:
    paths:
      - ".github/workflows/python-spin-dynamics.yml"
      - "PythonSpinDynamics/**"
  pull_request:
    paths:
      - ".github/workflows/python-spin-dynamics.yml"
      - "PythonSpinDynamics/**"

defaults:
  run:
    working-directory: PythonSpinDynamics

jobs:
  smoke:
    name: Smoke tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: PythonSpinDynamics/pyproject.toml
      - name: Install package
        run: python -m pip install -e ".[dev,opt,plot]"
      - name: Lint
        run: python -m ruff check src tests examples
      - name: Check generated API reference
        run: |
          python docs/generate_api_reference.py
          git diff --exit-code docs/python_api/api_reference.md
      - name: Smoke tests
        run: python -m unittest tests.smoke_tests

  validation:
    name: Full validation (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: PythonSpinDynamics/pyproject.toml
      - name: Install package
        run: python -m pip install -e ".[dev,opt,plot]"
      - name: Full unittest validation
        run: python -m unittest discover -s tests
